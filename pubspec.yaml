name: peoplepro
description: Powered by Group IT.
publish_to: "none"
version: 3.3.7+18

developer:
  name: Md. Jakir Hossain
  title: Team Lead (Software Development)
  email: codename.jakir@gmail.com

environment:
  sdk: ">=3.3.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  animations: ^2.0.7
  carousel_slider: ^4.2.1
  clipboard: ^0.1.3
  confetti: ^0.7.0
  connectivity_plus: ^2.2.1
  cupertino_icons: ^1.0.2
  device_info_plus: ^9.1.2
  flutter_keyboard_visibility: ^5.4.0
  flutter_linkify: ^5.0.2
  flutter_secure_storage: ^7.0.1
  flutter_slidable: ^3.0.1
  flutter_spinkit: ^5.1.0
  flutter_svg: ^1.1.6
  fluttertoast: ^8.2.6
  font_awesome_flutter: 10.0.0
  google_maps_flutter: ^2.2.3
  http: ^1.2.2
  image_cropper: ^1.4.1
  image_picker: ^1.1.0
  install_plugin: ^2.1.0
  intl: ^0.18.0
  location: ^4.4.0
  open_file: ^3.2.1
  package_info_plus: ^8.0.0
  path_provider: ^2.0.9
  percent_indicator: ^4.2.2
  provider: ^6.0.5
  qr_flutter: ^4.0.0
  rxdart: ^0.27.1
  signalr_core: ^1.1.1
  url_launcher: ^6.1.9
  version: ^2.0.3
  bcrypt: ^1.1.3
  share_plus: ^2.0.3
  syncfusion_flutter_datepicker: ^22.2.10
  flutter_device_id: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  change_app_package_name: ^1.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/files/
  fonts:
    - family: ModernDOS
      fonts:
        - asset: assets/fonts/ModernDOS8x16.ttf
    - family: DigitalNumbers
      fonts:
        - asset: assets/fonts/DigitalNumbers-Regular.ttf
